    <style>
        /* These styles ONLY apply to this page */
        .error-container-lottie {
            text-align: center;
            padding: 20px; /* Reduced padding for better mobile view */
            min-height: 70vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .error-title-lottie {
            font-size: 2.2rem; /* Adjusted for balance */
            font-weight: 700;
            color: #2c3e50;
            margin-top: 0; /* Reduced space as Lottie is bigger */
            margin-bottom: 1rem;
        }

        .error-text-lottie {
            font-size: 1.1rem;
            color: #555;
            max-width: 550px;
            line-height: 1.7;
            margin-bottom: 2.5rem;
        }

        .error-actions-lottie {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .error-button-lottie {
            padding: 12px 28px;
            font-size: 1rem;
            font-weight: 600;
            text-decoration: none;
            border-radius: 50px;
            border: 2px solid transparent;
            transition: all 0.3s ease;
        }

        /* Primary Button (Homepage) */
        .error-button-lottie {
            background-color: #007bff;
            color: #ffffff;
        }

        .error-button-lottie:hover {
            background-color: #0056b3;
            transform: translateY(-3px);
        }

        /* Secondary Button (Go Back) */
        .error-button-lottie.-secondary {
            background-color: transparent;
            color: #007bff;
            border-color: #007bff;
        }

        .error-button-lottie.-secondary:hover {
            background-color: #007bff;
            color: #ffffff;
        }
    </style>
    <!-- =========================================== -->
    <!-- ===== END: 404 PAGE-SPECIFIC STYLES ===== -->
    <!-- =========================================== -->

       <!--#include virtual="/_header.html" -->
    <main class="site-main">
        <div class="error-container-lottie">

            <!-- The NEW, FREE Lottie Player animation -->
            <lottie-player 
                src="https://assets9.lottiefiles.com/packages/lf20_kcsr6fcp.json"  
                background="transparent"  
                speed="1"  
                style="width: 300px; height: 300px;"  
                loop  
                autoplay>
            </lottie-player>

            <h1 class="error-title-lottie">Oops! Page Not Found.</h1>
            <p class="error-text-lottie">
                The page you're looking for might have been moved, deleted, under construction, or perhaps it never existed. 
            Let's get you back on track.
            </p>

            <div class="error-actions-lottie">
                <a href="/index.shtml" class="error-button-lottie">Return to Homepage</a>
                <a href="#" onclick="history.back(); return false;" class="error-button-lottie -secondary">Go to Previous Page</a>
            </div>

        </div>
    </main>
